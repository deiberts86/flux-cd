image:
    repository: harbor.homelab/ghcr-proxy-cache/gethomepage/homepage
    tag: latest

serviceAccount:
    create: true
    name: homepage

enableRbac: true

config:
    settings:
        disableHostValidation: true
    bookmarks:
        - Developer:
            - Github:
                - icon: github.svg
                  abbr: GH
                  href: https://github.com/
                  
        - Entertainment:
            - YouTube:
                - icon: youtube.svg
                  abbr: YT
                  href: https://youtube.com/
            - Rumble:
                - icon: rumble.svg
                  abbr: RB
                  href: https://rumble.com/
            - Spotify:
                - icon: spotify.svg
                  abbr: SP
                  href: https://open.spotify.com/
            - SoundCloud:
                - icon: soundcloud.svg
                  abbr: SC
                  href: https://soundcloud.com/
            
    widgets:
        # show the kubernetes widget, with the cluster summary and individual nodes
        - kubernetes:
            cluster:
                show: true
                cpu: true
                memory: true
                showLabel: true
                label: cluster
            nodes:
                show: true
                cpu: true
                memory: true
                showLabel: true
        - pihole:
            url: https://192.168.5.253
            version: 6
            key: Elemental2!
        - search:
            provider: duckduckgo
            target: _blank
    kubernetes:
        mode: cluster

ingress:
    main:
        enabled: true
        annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: Homepage
            gethomepage.dev/description: Dynamically Detected Homepage
            gethomepage.dev/group: Dynamic
            gethomepage.dev/icon: homepage.png
            cert-manager.io/cluster-issuer: homelab-ca
        hosts:
            - host: homepage.homelab
              paths:
                - path: /
                  pathType: Prefix
        tls:
            - hosts:
                - homepage.homelab
              secretName: homepage-tls
